<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空手道道場雲端同步系統</title>
    <!-- 引入 React, Tailwind, Firebase, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'karate-attendance-cloud';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const beltOrder = [
            '8段', '7段', '6段', '5段', '4段', '3段', '2段', '初段',
            '1級', '2級', '3級', '4級', '5級', '6級', '7級', '8級', '9級', '10級'
        ];

        // 完整初始名單
        const initialStudents = [
            {name: "梁伯偉", belt: "7段"}, {name: "黃家棟", belt: "7段"}, {name: "莫啟超", belt: "6段"},
            {name: "黃穎欣", belt: "6段"}, {name: "方浩南", belt: "6段"}, {name: "黃梅芳", belt: "6段"},
            {name: "陳傳文", belt: "5段"}, {name: "陳仁強", belt: "5段"}, {name: "曾少燕", belt: "4段"},
            {name: "許健邦", belt: "4段"}, {name: "卓偉倫", belt: "4段"}, {name: "黃偉聲", belt: "4段"},
            {name: "方浩銘", belt: "4段"}, {name: "區具興", belt: "4段"}, {name: "黃兆基", belt: "4段"},
            {name: "黃佩華", belt: "4段"}, {name: "謝家碧", belt: "3段"}, {name: "陳廷臻", belt: "3段"},
            {name: "李志龍", belt: "3段"}, {name: "周榮昌", belt: "3段"}, {name: "譚善威", belt: "3段"},
            {name: "黎翠筠", belt: "3段"}, {name: "柯庭芝", belt: "2段"}, {name: "張翠芝", belt: "2段"},
            {name: "胡珊林", belt: "2段"}, {name: "吳苑玲", belt: "2段"}, {name: "羅富健", belt: "2段"},
            {name: "陳新瑾", belt: "2段"}, {name: "卓偉康", belt: "2段"}, {name: "杜建德", belt: "2段"},
            {name: "溫浩麟", belt: "2段"}, {name: "李翔", belt: "2段"}, {name: "許嘉盈", belt: "2段"},
            {name: "馬康騏", belt: "2段"}, {name: "袁曉慧", belt: "2段"}, {name: "袁曉琦", belt: "2段"},
            {name: "陳士豪", belt: "2段"}, {name: "梁雪屏", belt: "2段"}, {name: "顏子樂", belt: "2段"},
            {name: "黃靜韻", belt: "初段"}, {name: "黃綽霖", belt: "初段"}, {name: "羅鎮榮", belt: "初段"},
            {name: "葉展峯", belt: "初段"}, {name: "伍婉婷", belt: "初段"}, {name: "黃家茵", belt: "初段"},
            {name: "袁國基", belt: "初段"}, {name: "鄧逸朗", belt: "初段"}, {name: "萬可靖", belt: "初段"},
            {name: "萬可霖", belt: "初段"}, {name: "陳佳濼", belt: "初段"}, {name: "張智嘉", belt: "初段"},
            {name: "陳家禧", belt: "初段"}, {name: "黃梓峰", belt: "初段"}, {name: "潘仲祺", belt: "初段"},
            {name: "廖煥兒", belt: "初段"}, {name: "吳菁琳", belt: "初段"}, {name: "陳奕思", belt: "初段"},
            {name: "黃樂軒", belt: "初段"}, {name: "楊潁鋒", belt: "初段"}, {name: "李天澍", belt: "初段"},
            {name: "王芯瑩", belt: "初段"}, {name: "盧家輝", belt: "初段"}, {name: "梁維倩", belt: "初段"},
            {name: "彭國禎", belt: "初段"}, {name: "陳伊琳", belt: "初段"}, {name: "高智榮", belt: "初段"},
            {name: "方國斌", belt: "初段"}, {name: "李心悅", belt: "初段"}, {name: "謝智勇", belt: "初段"},
            {name: "韋少薇", belt: "初段"}, {name: "伍永鴻", belt: "1級"}, {name: "蘇偉麟", belt: "1級"},
            {name: "樊智煜", belt: "1級"}, {name: "張栢浩", belt: "1級"}, {name: "李卓婷", belt: "1級"},
            {name: "鍾承舜", belt: "1級"}, {name: "馬婧嵐", belt: "1級"}, {name: "李浩天", belt: "1級"},
            {name: "余佩嬋", belt: "1級"}, {name: "胡子妍", belt: "1級"}, {name: "練煒浩", belt: "1級"},
            {name: "蔡賜宏", belt: "1級"}, {name: "王名妮", belt: "1級"}, {name: "黃樂瞳", belt: "1級"},
            {name: "陸禹恒", belt: "1級"}, {name: "謝展平", belt: "1級"}, {name: "吳卓臨", belt: "1級"},
            {name: "關詩彥", belt: "2級"}, {name: "王文承", belt: "2級"}, {name: "朱凱婷", belt: "2級"},
            {name: "勞翰琳", belt: "2級"}, {name: "顏尊理", belt: "2級"}, {name: "許皓寧", belt: "2級"},
            {name: "李依晴", belt: "2級"}, {name: "李磊靖", belt: "2級"}, {name: "李梓瀚", belt: "2級"},
            {name: "李凱悅", belt: "2級"}, {name: "楊海萍", belt: "2級"}, {name: "黃栢祺", belt: "2級"},
            {name: "伍煒城", belt: "2級"}, {name: "方文灝", belt: "2級"}, {name: "陳宗暉", belt: "2級"},
            {name: "黃立昕", belt: "3級"}, {name: "方胤傑", belt: "3級"}, {name: "周曉慧", belt: "3級"},
            {name: "敖芷晴", belt: "6級"}, {name: "黎樹成", belt: "4級"}, {name: "鄧婉筠", belt: "4級"},
            {name: "李美賢", belt: "4級"}, {name: "陳卓男", belt: "4級"}, {name: "洪逸威", belt: "4級"},
            {name: "胡子熙", belt: "4級"}, {name: "冼穎彤", belt: "4級"}, {name: "何浚軒", belt: "4級"},
            {name: "李力超", belt: "4級"}, {name: "周劍", belt: "4級"}, {name: "林景有", belt: "5級"},
            {name: "Lokesh", belt: "5級"}, {name: "Krishnan", belt: "5級"}, {name: "潘怡", belt: "5級"},
            {name: "錢永業", belt: "6級"}, {name: "謝楚蕎", belt: "6級"}, {name: "陳仲欣", belt: "6級"},
            {name: "方美茵", belt: "6級"}, {name: "Tejal", belt: "6級"}, {name: "黎語翹", belt: "6級"},
            {name: "鄺敏玲", belt: "7級"}, {name: "區朗晴", belt: "7級"}, {name: "林灝天", belt: "7級"},
            {name: "Pacscal Egard", belt: "7級"}, {name: "陳心怡", belt: "7級"}, {name: "葉俊汝", belt: "7級"},
            {name: "楊振強", belt: "7級"}, {name: "郭蕊熒", belt: "7級"}, {name: "關海容", belt: "7級"}
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('admin');
            const [isMobileMode, setIsMobileMode] = useState(false);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isInitializing, setIsInitializing] = useState(false);
            
            const [newName, setNewName] = useState('');
            const [newBelt, setNewBelt] = useState('10級');
            const [searchTerm, setSearchTerm] = useState('');
            const [mobileSearch, setMobileSearch] = useState('');
            const [showAll, setShowAll] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('mode') === 'checkin') setIsMobileMode(true);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Auth Error:", e); }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); });
                return () => unsubscribe();
            }, []);

            // 數據監聽與初始名單導入
            useEffect(() => {
                if (!user) return;
                
                const studentsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                
                const unsubscribe = studentsRef.onSnapshot(async (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // 如果數據庫完全是空的，自動導入名單
                    if (data.length === 0 && !isInitializing) {
                        setIsInitializing(true);
                        const batch = db.batch();
                        initialStudents.forEach((s, idx) => {
                            const docId = `init_${idx}_${Date.now()}`;
                            const ref = studentsRef.doc(docId);
                            batch.set(ref, {
                                name: s.name,
                                belt: s.belt,
                                attendanceCount: 0,
                                checkedIn: false,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        });
                        await batch.commit();
                        setIsInitializing(false);
                    } else {
                        setStudents(data);
                        setLoading(false);
                    }
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user, isInitializing]);

            const sortedStudents = useMemo(() => {
                return [...students].sort((a, b) => {
                    const indexA = beltOrder.indexOf(a.belt);
                    const indexB = beltOrder.indexOf(b.belt);
                    return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
                });
            }, [students]);

            const addStudent = async (name, belt, autoCheckin = false) => {
                if (!name.trim() || !user) return;
                const id = Date.now().toString();
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id);
                    await docRef.set({
                        name,
                        belt,
                        attendanceCount: 0,
                        checkedIn: autoCheckin,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) { alert("儲存失敗"); }
            };

            const toggleCheckin = async (id, status) => {
                if (!user) return;
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id);
                    await docRef.update({ checkedIn: status });
                } catch (e) { console.error(e); }
            };

            const finishSession = async () => {
                if (!user) return;
                const checkedIn = students.filter(s => s.checkedIn);
                if (checkedIn.length === 0) return;
                
                if (confirm(`結算 ${checkedIn.length} 位學員？`)) {
                    const batch = db.batch();
                    checkedIn.forEach(s => {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(s.id);
                        batch.update(ref, { 
                            attendanceCount: (s.attendanceCount || 0) + 1,
                            checkedIn: false 
                        });
                    });
                    await batch.commit();
                    alert("結算完成！");
                }
            };

            const deleteStudent = async (id) => {
                if (!user || !confirm("確定刪除？")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id).delete();
            };

            const currentUrl = window.location.href.split('?')[0];
            const qrValue = `${currentUrl}?mode=checkin`;
            const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrValue)}&color=bc002d`;

            if (loading || isInitializing) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 text-center p-6">
                    <div className="w-12 h-12 border-4 border-red-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
                    <div className="font-bold text-slate-500">
                        {isInitializing ? "正在導入 130+ 位名單至雲端..." : "正在讀取數據..."}
                    </div>
                    <p className="text-xs text-slate-400 mt-2">首次運行請稍候，系統正在建立數據檔案。</p>
                </div>
            );

            if (isMobileMode) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                        <div className="p-6 bg-red-600 text-white shadow-lg text-center">
                            <h1 className="text-2xl font-black italic">OSU! 道場簽到</h1>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto">
                            <div className="mb-4 flex gap-2">
                                <input 
                                    type="text" 
                                    placeholder="搜尋你的名字..."
                                    className="flex-1 p-4 rounded-2xl border-none shadow-md outline-none focus:ring-2 focus:ring-red-500 text-lg"
                                    value={mobileSearch}
                                    onChange={e => setMobileSearch(e.target.value)}
                                />
                                <button onClick={() => setShowAddModal(true)} className="bg-slate-800 text-white px-4 rounded-2xl shadow-md flex items-center justify-center">
                                    <Icon name="user-plus" />
                                </button>
                            </div>
                            <div className="grid gap-3 pb-20">
                                {sortedStudents.filter(s => !s.checkedIn && s.name.includes(mobileSearch)).slice(0, 50).map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={async () => {
                                            if (confirm(`確認為 ${s.name} 簽到？`)) {
                                                await toggleCheckin(s.id, true);
                                                alert("簽到成功！OSU!");
                                                setMobileSearch('');
                                            }
                                        }}
                                        className="w-full text-left p-5 rounded-2xl bg-white shadow-sm flex justify-between items-center active:scale-95 transition-all border border-slate-100"
                                    >
                                        <div>
                                            <div className="font-bold text-lg text-slate-800">{s.name}</div>
                                            <div className="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded inline-block mt-1">{s.belt}</div>
                                        </div>
                                        <Icon name="check-circle" className="text-slate-200" />
                                    </button>
                                ))}
                            </div>
                        </div>
                        {showAddModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                                <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl scale-in">
                                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="user-plus" className="text-red-600"/> 臨時報名</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="真實姓名" className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:border-red-500" value={newName} onChange={e=>setNewName(e.target.value)} />
                                        <select className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200" value={newBelt} onChange={e=>setNewBelt(e.target.value)}>
                                            {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
                                        </select>
                                        <div className="flex gap-3 pt-4">
                                            <button onClick={()=>setShowAddModal(false)} className="flex-1 py-4 font-bold text-slate-400">取消</button>
                                            <button 
                                                onClick={async ()=>{
                                                    if(!newName) return;
                                                    await addStudent(newName, newBelt, true);
                                                    setShowAddModal(false);
                                                    setNewName('');
                                                    alert("報名並簽到成功！");
                                                }}
                                                className="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold"
                                            >確認加入</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 font-sans text-slate-800">
                    <div className="flex bg-white rounded-2xl shadow-sm p-1.5 mb-8 border border-slate-200">
                        <button onClick={() => setActiveTab('admin')} className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition ${activeTab === 'admin' ? 'bg-red-600 text-white shadow-md' : 'text-slate-400'}`}>
                            <Icon name="users" /> 學員名單
                        </button>
                        <button onClick={() => setActiveTab('checkin')} className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition ${activeTab === 'checkin' ? 'bg-red-600 text-white shadow-md' : 'text-slate-400'}`}>
                            <Icon name="qr-code" /> 簽到 QR
                        </button>
                    </div>

                    {activeTab === 'admin' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 sticky top-8">
                                    <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-600"><Icon name="search" /> 篩選名單</h3>
                                    <input type="text" placeholder="輸入姓名搜尋..." className="w-full px-4 py-3 rounded-xl border border-slate-200 mb-4 outline-none focus:border-red-500" onChange={e => setSearchTerm(e.target.value)} />
                                    <div className="flex items-center justify-between text-sm bg-slate-50 p-4 rounded-xl mb-4">
                                        <span className="font-bold text-slate-500">只顯示已簽到</span>
                                        <button onClick={() => setShowAll(!showAll)} className={`w-10 h-5 rounded-full relative transition-colors ${!showAll ? 'bg-green-500' : 'bg-slate-300'}`}>
                                            <div className={`absolute top-1 w-3 h-3 bg-white rounded-full shadow-sm transition-all ${!showAll ? 'left-6' : 'left-1'}`} />
                                        </button>
                                    </div>
                                    <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                        <div className="text-xs text-blue-500 font-bold mb-1 uppercase tracking-wider">今日出勤率</div>
                                        <div className="text-2xl font-black text-blue-700">{students.filter(s=>s.checkedIn).length} / {students.length}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="max-h-[600px] overflow-y-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-400 font-bold sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-6 py-4">狀態</th>
                                                    <th className="px-6 py-4 text-base">姓名</th>
                                                    <th className="px-6 py-4">級數</th>
                                                    <th className="px-6 py-4 text-center">出席次數</th>
                                                    <th className="px-6 py-4 text-center">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {sortedStudents.filter(s => (showAll || s.checkedIn) && s.name.includes(searchTerm)).map(s => (
                                                    <tr key={s.id} className={`hover:bg-slate-50 transition ${s.checkedIn ? 'bg-green-50/30' : ''}`}>
                                                        <td className="px-6 py-4">
                                                            <button 
                                                                onClick={() => toggleCheckin(s.id, !s.checkedIn)}
                                                                className={`px-3 py-1 rounded-full text-[10px] font-black uppercase transition-all ${s.checkedIn ? 'bg-green-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}
                                                            >
                                                                {s.checkedIn ? '已簽到' : '未簽到'}
                                                            </button>
                                                        </td>
                                                        <td className="px-6 py-4 font-bold text-slate-700 text-base">{s.name}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${s.belt.includes('段') ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600'}`}>{s.belt}</span>
                                                        </td>
                                                        <td className="px-6 py-4 font-mono font-bold text-center text-lg text-blue-600">{s.attendanceCount || 0}</td>
                                                        <td className="px-6 py-4 text-center">
                                                            <button onClick={() => deleteStudent(s.id)} className="text-slate-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={finishSession} className="flex-1 bg-blue-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-3">
                                        <Icon name="save" /> 結束今日課堂並結算
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-[3.5rem] shadow-xl border-8 border-red-50 p-10 md:p-20 flex flex-col items-center text-center max-w-2xl mx-auto">
                            <h2 className="text-4xl font-black text-slate-800 mb-4 italic tracking-tight">道場簽到 QR</h2>
                            <p className="text-slate-400 mb-10 font-medium leading-relaxed">請學員掃描進入系統簽到。<br/>若名單無名，請點擊手機右上角「＋」報名。</p>
                            <div className="p-8 bg-white rounded-[3rem] shadow-2xl shadow-red-100 border border-slate-50">
                                <img src={qrSrc} alt="QR Code" className="w-64 h-64" />
                            </div>
                            <div className="mt-8 text-xs text-slate-300 font-mono tracking-widest uppercase">OSS! Karate Management System</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .scale-in { animation: scaleIn 0.3s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</body>
</html>
