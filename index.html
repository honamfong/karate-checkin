<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空手道道場雲端同步系統</title>
    <!-- 引入 React, Tailwind, Firebase, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 配置 (由環境自動注入) ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'karate-attendance-cloud';

        // 初始化 Firebase (Compat 版本確保在單一 HTML 穩定運行)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const beltOrder = [
            '8段', '7段', '6段', '5段', '4段', '3段', '2段', '初段',
            '1級', '2級', '3級', '4級', '5級', '6級', '7級', '8級', '9級', '10級'
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('admin');
            const [isMobileMode, setIsMobileMode] = useState(false);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            
            // 表單狀態
            const [newName, setNewName] = useState('');
            const [newBelt, setNewBelt] = useState('10級');
            const [searchTerm, setSearchTerm] = useState('');
            const [mobileSearch, setMobileSearch] = useState('');
            const [showAll, setShowAll] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false); // 手機端加名彈窗

            // 1. 初始化匿名登錄與模式檢查
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('mode') === 'checkin') setIsMobileMode(true);

                auth.signInAnonymously().catch(console.error);
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // 2. 實時監聽雲端數據 (Firestore)
            useEffect(() => {
                if (!user) return;
                // 注意：路徑遵循規範 /artifacts/{appId}/public/data/students
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setStudents(data);
                        setLoading(false);
                    }, (err) => {
                        console.error("Firestore Error:", err);
                        setLoading(false);
                    });
                return () => unsubscribe();
            }, [user]);

            const sortedStudents = useMemo(() => {
                return [...students].sort((a, b) => {
                    const indexA = beltOrder.indexOf(a.belt);
                    const indexB = beltOrder.indexOf(b.belt);
                    return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
                });
            }, [students]);

            // 操作：新增學員 (雲端)
            const addStudent = async (name, belt, autoCheckin = false) => {
                if (!name.trim()) return;
                const id = Date.now().toString();
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id).set({
                        name,
                        belt,
                        attendanceCount: 0,
                        checkedIn: autoCheckin,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) { alert("儲存失敗，請檢查網絡"); }
            };

            // 操作：簽到
            const toggleCheckin = async (id, status) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id).update({
                    checkedIn: status
                });
            };

            // 操作：結算
            const finishSession = async () => {
                const checkedIn = students.filter(s => s.checkedIn);
                if (checkedIn.length === 0) return;
                if (confirm(`結算 ${checkedIn.length} 位已簽到學員？`)) {
                    const batch = db.batch();
                    checkedIn.forEach(s => {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(s.id);
                        batch.update(ref, { 
                            attendanceCount: (s.attendanceCount || 0) + 1,
                            checkedIn: false 
                        });
                    });
                    await batch.commit();
                    alert("數據已同步至雲端並結算完成！");
                }
            };

            const currentUrl = window.location.href.split('?')[0];
            const qrValue = `${currentUrl}?mode=checkin`;
            const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrValue)}&color=bc002d`;

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400 animate-pulse text-lg">正在連接雲端數據庫...</div>;

            // --- 手機模式 UI ---
            if (isMobileMode) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                        <div className="p-6 bg-red-600 text-white shadow-lg text-center">
                            <h1 className="text-2xl font-black italic">OSU! 道場簽到</h1>
                        </div>
                        
                        <div className="flex-1 p-6">
                            <div className="mb-6 flex gap-2">
                                <input 
                                    type="text" 
                                    placeholder="搜尋名字..."
                                    className="flex-1 p-4 rounded-2xl border-none shadow-md outline-none focus:ring-2 focus:ring-red-500"
                                    value={mobileSearch}
                                    onChange={e => setMobileSearch(e.target.value)}
                                />
                                <button 
                                    onClick={() => setShowAddModal(true)}
                                    className="bg-slate-800 text-white p-4 rounded-2xl shadow-md flex items-center gap-2"
                                >
                                    <Icon name="user-plus" />
                                    <span className="text-sm font-bold whitespace-nowrap">新學員</span>
                                </button>
                            </div>

                            <div className="grid gap-4">
                                {sortedStudents.filter(s => !s.checkedIn && s.name.includes(mobileSearch)).map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={async () => {
                                            if (confirm(`確認為 ${s.name} 簽到？`)) {
                                                await toggleCheckin(s.id, true);
                                                alert("簽到成功！OSU!");
                                            }
                                        }}
                                        className="w-full text-left p-5 rounded-2xl bg-white shadow-sm border-2 border-white flex justify-between items-center active:scale-95 transition-all"
                                    >
                                        <div>
                                            <div className="font-bold text-lg text-slate-800">{s.name}</div>
                                            <div className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded inline-block mt-1">{s.belt}</div>
                                        </div>
                                        <Icon name="chevron-right" className="text-slate-300" />
                                    </button>
                                ))}
                            </div>

                            {sortedStudents.filter(s => !s.checkedIn && s.name.includes(mobileSearch)).length === 0 && (
                                <div className="text-center py-10">
                                    <p className="text-slate-400">找不到名字？請點擊右上角「新學員」報名</p>
                                </div>
                            )}
                        </div>

                        {/* 手機報名彈窗 */}
                        {showAddModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                                <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl scale-in">
                                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="user-plus" className="text-red-600"/> 學員報名</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="真實姓名" className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:border-red-500" value={newName} onChange={e=>setNewName(e.target.value)} />
                                        <select className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200" value={newBelt} onChange={e=>setNewBelt(e.target.value)}>
                                            {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
                                        </select>
                                        <div className="flex gap-3 pt-4">
                                            <button onClick={()=>setShowAddModal(false)} className="flex-1 py-4 font-bold text-slate-400">取消</button>
                                            <button 
                                                onClick={async ()=>{
                                                    if(!newName) return;
                                                    await addStudent(newName, newBelt, true);
                                                    setShowAddModal(false);
                                                    setNewName('');
                                                    alert("報名並簽到成功！");
                                                }}
                                                className="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg"
                                            >
                                                確認加入
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // --- 教練管理介面 (電腦端) ---
            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8 font-sans text-slate-800">
                    <div className="flex bg-white rounded-2xl shadow-sm p-1.5 mb-8 border">
                        <button onClick={() => setActiveTab('admin')} className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition ${activeTab === 'admin' ? 'bg-red-600 text-white' : 'text-slate-400'}`}>
                            <Icon name="users" /> 教練管理
                        </button>
                        <button onClick={() => setActiveTab('checkin')} className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition ${activeTab === 'checkin' ? 'bg-red-600 text-white' : 'text-slate-400'}`}>
                            <Icon name="qr-code" /> 簽到碼
                        </button>
                    </div>

                    {activeTab === 'admin' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* 左側控制欄 */}
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h3 className="font-bold mb-5 flex items-center gap-2 text-red-600 text-lg"><Icon name="plus-circle" /> 快速加人</h3>
                                    <div className="space-y-3">
                                        <input type="text" value={newName} onChange={e => setNewName(e.target.value)} placeholder="姓名" className="w-full px-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-red-500" />
                                        <select value={newBelt} onChange={e => setNewBelt(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white">
                                            {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
                                        </select>
                                        <button onClick={()=>{addStudent(newName, newBelt); setNewName('')}} className="w-full bg-slate-900 text-white py-2.5 rounded-xl font-bold hover:bg-black transition-colors">加入名單</button>
                                    </div>
                                </div>
                                
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-600"><Icon name="search" /> 搜尋學員</h3>
                                    <input type="text" placeholder="輸入關鍵字..." className="w-full px-4 py-2.5 rounded-xl border border-slate-200 mb-4" onChange={e => setSearchTerm(e.target.value)} />
                                    <div className="flex items-center justify-between text-sm bg-slate-50 p-3 rounded-xl">
                                        <span className="font-bold text-slate-500">顯示全體</span>
                                        <button onClick={() => setShowAll(!showAll)} className={`w-10 h-5 rounded-full relative transition-colors ${showAll ? 'bg-red-500' : 'bg-slate-300'}`}>
                                            <div className={`absolute top-1 w-3 h-3 bg-white rounded-full shadow-sm transition-all ${showAll ? 'left-6' : 'left-1'}`} />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* 右側列表 */}
                            <div className="lg:col-span-2 space-y-6">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                                        <div>
                                            <h2 className="font-bold text-xl">雲端名單 ({students.length})</h2>
                                            <div className="flex items-center gap-1 text-green-500 text-[10px] mt-1 uppercase font-black tracking-widest">
                                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></div>
                                                Cloud Connected
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <Icon name="refresh-cw" size={18} className="text-slate-300 cursor-pointer" onClick={()=>window.location.reload()} />
                                        </div>
                                    </div>
                                    <div className="max-h-[500px] overflow-y-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-400 font-bold sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-6 py-4">狀態</th>
                                                    <th className="px-6 py-4">姓名</th>
                                                    <th className="px-6 py-4">級數</th>
                                                    <th className="px-6 py-4">出席次</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {sortedStudents.filter(s => (showAll || s.checkedIn) && s.name.includes(searchTerm)).map(s => (
                                                    <tr key={s.id} className="hover:bg-slate-50/50 transition">
                                                        <td className="px-6 py-4">
                                                            <button 
                                                                onClick={() => toggleCheckin(s.id, !s.checkedIn)}
                                                                className={`px-3 py-1 rounded-full text-[10px] font-black uppercase transition-all ${s.checkedIn ? 'bg-green-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}
                                                            >
                                                                {s.checkedIn ? '已簽到' : '未簽到'}
                                                            </button>
                                                        </td>
                                                        <td className="px-6 py-4 font-bold text-slate-700">{s.name}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${s.belt.includes('段') ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600'}`}>{s.belt}</span>
                                                        </td>
                                                        <td className="px-6 py-4 font-mono font-bold text-lg text-blue-600">{s.attendanceCount}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <button onClick={finishSession} className="w-full bg-blue-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">
                                    結束今日課堂並結算數據
                                </button>
                                <p className="text-center text-xs text-slate-400">數據將即時同步至所有已連網設備</p>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-[3.5rem] shadow-xl border-8 border-red-50 p-10 md:p-20 flex flex-col items-center text-center max-w-2xl mx-auto">
                            <h2 className="text-4xl font-black text-slate-800 mb-4 italic tracking-tight">道場雲端簽到 QR</h2>
                            <p className="text-slate-400 mb-10 font-medium">請學員掃描進入，若名單無名可自行報名。</p>
                            
                            <div className="p-8 bg-white rounded-[3rem] shadow-2xl shadow-red-100 border border-slate-50">
                                <img src={qrSrc} alt="QR Code" className="w-64 h-64" />
                            </div>
                            
                            <div className="mt-10 p-5 bg-amber-50 rounded-2xl border border-amber-100 text-amber-700 text-sm text-left flex gap-3">
                                <Icon name="shield-check" className="shrink-0 mt-1" />
                                <div>
                                    <strong>雲端同步提醒：</strong>
                                    此 QR Code 指向的是您的專屬網頁。建議將網頁加入手機主螢幕書籤，下次上課直接打開即可。
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .scale-in { animation: scaleIn 0.3s ease-out forwards; }
    </style>
</body>
</html>
