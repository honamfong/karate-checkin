<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空手道道場雲端同步系統</title>
    <!-- 引入 React, Tailwind, Firebase, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (使用兼容模式以確保穩定) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'karate-attendance-v2';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const beltOrder = [
            '8段', '7段', '6段', '5段', '4段', '3段', '2段', '初段',
            '1級', '2級', '3級', '4級', '5級', '6級', '7級', '8級', '9級', '10級'
        ];

        // 完整初始名單 (130+ 人)
        const initialStudents = [
            {name: "梁伯偉", belt: "7段"}, {name: "黃家棟", belt: "7段"}, {name: "莫啟超", belt: "6段"},
            {name: "黃穎欣", belt: "6段"}, {name: "方浩南", belt: "6段"}, {name: "黃梅芳", belt: "6段"},
            {name: "陳傳文", belt: "5段"}, {name: "陳仁強", belt: "5段"}, {name: "曾少燕", belt: "4段"},
            {name: "許健邦", belt: "4段"}, {name: "卓偉倫", belt: "4段"}, {name: "黃偉聲", belt: "4段"},
            {name: "方浩銘", belt: "4段"}, {name: "區具興", belt: "4段"}, {name: "黃兆基", belt: "4段"},
            {name: "黃佩華", belt: "4段"}, {name: "謝家碧", belt: "3段"}, {name: "陳廷臻", belt: "3段"},
            {name: "李志龍", belt: "3段"}, {name: "周榮昌", belt: "3段"}, {name: "譚善威", belt: "3段"},
            {name: "黎翠筠", belt: "3段"}, {name: "柯庭芝", belt: "2段"}, {name: "張翠芝", belt: "2段"},
            {name: "胡珊林", belt: "2段"}, {name: "吳苑玲", belt: "2段"}, {name: "羅富健", belt: "2段"},
            {name: "陳新瑾", belt: "2段"}, {name: "卓偉康", belt: "2段"}, {name: "杜建德", belt: "2段"},
            {name: "溫浩麟", belt: "2段"}, {name: "李翔", belt: "2段"}, {name: "許嘉盈", belt: "2段"},
            {name: "馬康騏", belt: "2段"}, {name: "袁曉慧", belt: "2段"}, {name: "袁曉琦", belt: "2段"},
            {name: "陳士豪", belt: "2段"}, {name: "梁雪屏", belt: "2段"}, {name: "顏子樂", belt: "2段"},
            {name: "黃靜韻", belt: "初段"}, {name: "黃綽霖", belt: "初段"}, {name: "羅鎮榮", belt: "初段"},
            {name: "葉展峯", belt: "初段"}, {name: "伍婉婷", belt: "初段"}, {name: "黃家茵", belt: "初段"},
            {name: "袁國基", belt: "初段"}, {name: "鄧逸朗", belt: "初段"}, {name: "萬可靖", belt: "初段"},
            {name: "萬可霖", belt: "初段"}, {name: "陳佳濼", belt: "初段"}, {name: "張智嘉", belt: "初段"},
            {name: "陳家禧", belt: "初段"}, {name: "黃梓峰", belt: "初段"}, {name: "潘仲祺", belt: "初段"},
            {name: "廖煥兒", belt: "初段"}, {name: "吳菁琳", belt: "初段"}, {name: "陳奕思", belt: "初段"},
            {name: "黃樂軒", belt: "初段"}, {name: "楊潁鋒", belt: "初段"}, {name: "李天澍", belt: "初段"},
            {name: "王芯瑩", belt: "初段"}, {name: "盧家輝", belt: "初段"}, {name: "梁維倩", belt: "初段"},
            {name: "彭國禎", belt: "初段"}, {name: "陳伊琳", belt: "初段"}, {name: "高智榮", belt: "初段"},
            {name: "方國斌", belt: "初段"}, {name: "李心悅", belt: "初段"}, {name: "謝智勇", belt: "初段"},
            {name: "韋少薇", belt: "初段"}, {name: "伍永鴻", belt: "1級"}, {name: "蘇偉麟", belt: "1級"},
            {name: "樊智煜", belt: "1級"}, {name: "張栢浩", belt: "1級"}, {name: "李卓婷", belt: "1級"},
            {name: "鍾承舜", belt: "1級"}, {name: "馬婧嵐", belt: "1級"}, {name: "李浩天", belt: "1級"},
            {name: "余佩嬋", belt: "1級"}, {name: "胡子妍", belt: "1級"}, {name: "練煒浩", belt: "1級"},
            {name: "蔡賜宏", belt: "1級"}, {name: "王名妮", belt: "1級"}, {name: "黃樂瞳", belt: "1級"},
            {name: "陸禹恒", belt: "1級"}, {name: "謝展平", belt: "1級"}, {name: "吳卓臨", belt: "1級"},
            {name: "關詩彥", belt: "2級"}, {name: "王文承", belt: "2級"}, {name: "朱凱婷", belt: "2級"},
            {name: "勞翰琳", belt: "2級"}, {name: "顏尊理", belt: "2級"}, {name: "許皓寧", belt: "2級"},
            {name: "李依晴", belt: "2級"}, {name: "李磊靖", belt: "2級"}, {name: "李梓瀚", belt: "2級"},
            {name: "李凱悅", belt: "2級"}, {name: "楊海萍", belt: "2級"}, {name: "黃栢祺", belt: "2級"},
            {name: "伍煒城", belt: "2級"}, {name: "方文灝", belt: "2級"}, {name: "陳宗暉", belt: "2級"},
            {name: "黃立昕", belt: "3級"}, {name: "方胤傑", belt: "3級"}, {name: "周曉慧", belt: "3級"},
            {name: "敖芷晴", belt: "6級"}, {name: "黎樹成", belt: "4級"}, {name: "鄧婉筠", belt: "4級"},
            {name: "李美賢", belt: "4級"}, {name: "陳卓男", belt: "4級"}, {name: "洪逸威", belt: "4級"},
            {name: "胡子熙", belt: "4級"}, {name: "冼穎彤", belt: "4級"}, {name: "何浚軒", belt: "4級"},
            {name: "李力超", belt: "4級"}, {name: "周劍", belt: "4級"}, {name: "林景有", belt: "5級"},
            {name: "Lokesh", belt: "5級"}, {name: "Krishnan", belt: "5級"}, {name: "潘怡", belt: "5級"},
            {name: "錢永業", belt: "6級"}, {name: "謝楚蕎", belt: "6級"}, {name: "陳仲欣", belt: "6級"},
            {name: "方美茵", belt: "6級"}, {name: "Tejal", belt: "6級"}, {name: "黎語翹", belt: "6級"},
            {name: "鄺敏玲", belt: "7級"}, {name: "區朗晴", belt: "7級"}, {name: "林灝天", belt: "7級"},
            {name: "Pacscal Egard", belt: "7級"}, {name: "陳心怡", belt: "7級"}, {name: "葉俊汝", belt: "7級"},
            {name: "楊振強", belt: "7級"}, {name: "郭蕊熒", belt: "7級"}, {name: "關海容", belt: "7級"}
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('admin');
            const [isMobileMode, setIsMobileMode] = useState(false);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [syncMessage, setSyncMessage] = useState('正在初始化...');
            
            const [newName, setNewName] = useState('');
            const [newBelt, setNewBelt] = useState('10級');
            const [searchTerm, setSearchTerm] = useState('');
            const [mobileSearch, setMobileSearch] = useState('');
            const [showAll, setShowAll] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);

            // 防止重複觸發導入
            const initStarted = useRef(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('mode') === 'checkin') setIsMobileMode(true);

                const initAuth = async () => {
                    try {
                        setSyncMessage("正在連線至雲端伺服器...");
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { 
                        console.error("Auth Error:", e);
                        setSyncMessage("連線錯誤，請刷新網頁。");
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(u => { setUser(u); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const studentsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                
                const unsubscribe = studentsRef.onSnapshot(async (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // 如果數據庫為空且未曾啟動導入
                    if (data.length === 0 && !initStarted.current) {
                        initStarted.current = true;
                        setSyncMessage("正在導入完整學員名單 (130+ 人)...");
                        
                        try {
                            // 分批處理避免 Firebase 負擔過重
                            const batch = db.batch();
                            initialStudents.forEach((s, idx) => {
                                const docRef = studentsRef.doc(`member_${idx}`);
                                batch.set(docRef, {
                                    name: s.name,
                                    belt: s.belt,
                                    attendanceCount: 0,
                                    checkedIn: false,
                                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            });
                            await batch.commit();
                        } catch (err) {
                            console.error("Batch Init Error:", err);
                        }
                    } else {
                        setStudents(data);
                        setLoading(false);
                    }
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const sortedStudents = useMemo(() => {
                return [...students].sort((a, b) => {
                    const indexA = beltOrder.indexOf(a.belt);
                    const indexB = beltOrder.indexOf(b.belt);
                    return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
                });
            }, [students]);

            const toggleCheckin = async (id, status) => {
                if (!user) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id).update({ 
                        checkedIn: status 
                    });
                } catch (e) { console.error(e); }
            };

            const finishSession = async () => {
                if (!user) return;
                const checkedIn = students.filter(s => s.checkedIn);
                if (checkedIn.length === 0) return;
                
                if (confirm(`確認結算今日出席的 ${checkedIn.length} 位學員？`)) {
                    const batch = db.batch();
                    checkedIn.forEach(s => {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(s.id);
                        batch.update(ref, { 
                            attendanceCount: (s.attendanceCount || 0) + 1,
                            checkedIn: false 
                        });
                    });
                    await batch.commit();
                    alert("數據已同步至雲端，結算完成！");
                }
            };

            const deleteStudent = async (id) => {
                if (!user || !confirm("確定從雲端名單刪除？")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id).delete();
            };

            const addStudent = async (name, belt, autoCheckin = false) => {
                if (!name.trim() || !user) return;
                const id = "manual_" + Date.now();
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id).set({
                        name,
                        belt,
                        attendanceCount: 0,
                        checkedIn: autoCheckin,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setNewName('');
                    setShowAddModal(false);
                } catch (e) { alert("儲存失敗"); }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white p-6">
                    <div className="w-16 h-16 border-4 border-slate-700 border-t-red-500 rounded-full animate-spin mb-6"></div>
                    <div className="text-xl font-black italic tracking-widest mb-2">OSU! LOADING</div>
                    <div className="text-slate-400 font-medium">{syncMessage}</div>
                </div>
            );

            if (isMobileMode) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                        <div className="p-6 bg-red-600 text-white shadow-lg text-center sticky top-0 z-20">
                            <h1 className="text-2xl font-black italic tracking-tighter">KARATE CHECK-IN</h1>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto">
                            <div className="mb-6 flex gap-2 sticky top-2 z-10">
                                <input 
                                    type="text" 
                                    placeholder="輸入姓名..."
                                    className="flex-1 p-4 rounded-2xl border-none shadow-xl outline-none focus:ring-4 focus:ring-red-500/20 text-lg font-bold"
                                    value={mobileSearch}
                                    onChange={e => setMobileSearch(e.target.value)}
                                />
                                <button onClick={() => setShowAddModal(true)} className="bg-slate-900 text-white w-14 rounded-2xl shadow-xl flex items-center justify-center">
                                    <Icon name="user-plus" />
                                </button>
                            </div>
                            <div className="grid gap-3 pb-10">
                                {sortedStudents.filter(s => !s.checkedIn && s.name.includes(mobileSearch)).map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={async () => {
                                            if (confirm(`確認為 ${s.name} 簽到？`)) {
                                                await toggleCheckin(s.id, true);
                                                setMobileSearch('');
                                            }
                                        }}
                                        className="w-full text-left p-5 rounded-2xl bg-white shadow-sm flex justify-between items-center border border-slate-100 active:scale-95 transition-all"
                                    >
                                        <div>
                                            <div className="font-bold text-lg text-slate-800">{s.name}</div>
                                            <div className="text-xs font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded inline-block mt-1">{s.belt}</div>
                                        </div>
                                        <Icon name="circle" className="text-slate-200" />
                                    </button>
                                ))}
                            </div>
                        </div>
                        {showAddModal && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-6 z-50">
                                <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl scale-in">
                                    <h2 className="text-2xl font-black mb-6 text-slate-800">臨時加入學員</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="真實姓名" className="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none focus:ring-2 focus:ring-red-500 font-bold" value={newName} onChange={e=>setNewName(e.target.value)} />
                                        <select className="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold" value={newBelt} onChange={e=>setNewBelt(e.target.value)}>
                                            {beltOrder.map(b => <option key={b} value={b}>{b}</option>)}
                                        </select>
                                        <div className="flex gap-3 pt-4">
                                            <button onClick={()=>setShowAddModal(false)} className="flex-1 py-4 font-bold text-slate-400">取消</button>
                                            <button onClick={()=>addStudent(newName, newBelt, true)} className="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg">確認簽到</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 font-sans">
                    <div className="flex bg-white rounded-3xl shadow-sm p-2 mb-10 border border-slate-200 max-w-md mx-auto">
                        <button onClick={() => setActiveTab('admin')} className={`flex-1 py-4 rounded-2xl font-black italic tracking-widest flex items-center justify-center gap-2 transition ${activeTab === 'admin' ? 'bg-red-600 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'}`}>
                            <Icon name="users" /> ADMIN
                        </button>
                        <button onClick={() => setActiveTab('checkin')} className={`flex-1 py-4 rounded-2xl font-black italic tracking-widest flex items-center justify-center gap-2 transition ${activeTab === 'checkin' ? 'bg-red-600 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'}`}>
                            <Icon name="qr-code" /> QR CODE
                        </button>
                    </div>

                    {activeTab === 'admin' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 sticky top-8">
                                    <h3 className="font-black text-slate-800 mb-6 flex items-center gap-2 border-b pb-4"><Icon name="search" /> 搜尋篩選</h3>
                                    <input type="text" placeholder="輸入學員姓名..." className="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none mb-6 outline-none focus:ring-2 focus:ring-red-500 font-bold" onChange={e => setSearchTerm(e.target.value)} />
                                    <div className="space-y-4">
                                        <div className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                            <span className="font-bold text-slate-500">顯示所有人</span>
                                            <button onClick={() => setShowAll(!showAll)} className={`w-12 h-6 rounded-full relative transition-all ${showAll ? 'bg-slate-200' : 'bg-green-500'}`}>
                                                <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${showAll ? 'left-1' : 'left-7'}`} />
                                            </button>
                                        </div>
                                        <div className="p-5 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-200">
                                            <div className="text-[10px] font-black uppercase opacity-60 mb-1">今日出勤數據</div>
                                            <div className="text-3xl font-black italic tracking-tighter">
                                                {students.filter(s=>s.checkedIn).length} <span className="text-sm opacity-50 font-normal">/ {students.length}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-slate-400 font-black text-[11px] uppercase tracking-widest sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-8 py-5">狀態</th>
                                                    <th className="px-8 py-5">姓名</th>
                                                    <th className="px-8 py-5">段/級數</th>
                                                    <th className="px-8 py-5 text-center">出席次數</th>
                                                    <th className="px-8 py-5 text-right">管理</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {sortedStudents.filter(s => (showAll || s.checkedIn) && s.name.includes(searchTerm)).map(s => (
                                                    <tr key={s.id} className={`group hover:bg-slate-50/50 transition ${s.checkedIn ? 'bg-green-50/50' : ''}`}>
                                                        <td className="px-8 py-5">
                                                            <button 
                                                                onClick={() => toggleCheckin(s.id, !s.checkedIn)}
                                                                className={`px-4 py-1.5 rounded-full text-[10px] font-black italic transition-all ${s.checkedIn ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}
                                                            >
                                                                {s.checkedIn ? 'CHECKED' : 'ABSENT'}
                                                            </button>
                                                        </td>
                                                        <td className="px-8 py-5 font-black text-slate-700 text-lg">{s.name}</td>
                                                        <td className="px-8 py-5">
                                                            <span className={`px-3 py-1 rounded-lg text-[11px] font-black ${s.belt.includes('段') ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                                                {s.belt}
                                                            </span>
                                                        </td>
                                                        <td className="px-8 py-5 text-center font-mono font-black text-xl text-blue-600">{s.attendanceCount || 0}</td>
                                                        <td className="px-8 py-5 text-right">
                                                            <button onClick={() => deleteStudent(s.id)} className="text-slate-200 hover:text-red-500 transition-colors">
                                                                <Icon name="trash-2" size={16} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <button onClick={finishSession} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl italic tracking-widest shadow-2xl hover:bg-black transition-all active:scale-95 flex items-center justify-center gap-4">
                                    <Icon name="award" size={24} /> 結算今日課程數據 (OSU!)
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-[4rem] shadow-2xl border border-slate-100 p-12 md:p-24 flex flex-col items-center text-center max-w-3xl mx-auto scale-in">
                            <h2 className="text-5xl font-black text-slate-900 mb-6 italic tracking-tighter uppercase">Check-in Portal</h2>
                            <p className="text-slate-400 mb-12 text-lg font-medium max-w-md">請學員掃描下方二維碼進入系統，搜尋並點擊姓名完成簽到。OSS!</p>
                            <div className="p-10 bg-white rounded-[3.5rem] shadow-2xl shadow-red-100 border-8 border-slate-50 relative overflow-hidden group">
                                <img src={qrSrc} alt="QR Code" className="w-72 h-72 relative z-10" />
                                <div className="absolute inset-0 bg-red-600 opacity-0 group-hover:opacity-5 transition-opacity"></div>
                            </div>
                            <div className="mt-12 flex items-center gap-3 text-slate-300 font-mono tracking-widest text-xs uppercase">
                                <div className="w-12 h-[1px] bg-slate-200"></div>
                                Karate Cloud Sync System v2.0
                                <div className="w-12 h-[1px] bg-slate-200"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f8fafc; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</body>
</html>
